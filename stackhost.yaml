version: "2.0.0"

user:
  name: itzzzyashu
  github: itzzzyashu

runtime:
  image: python:3.11-slim

commands:
  package: ""
  build:
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    - pip install flask
    - npm install
  start: node app.js

repository:
  branch: main
  auto_deploy: true
