version: "2.0.0"

user:
  name: itzzzyashu
  github: itzzzyashu

runtime:
  image: python:3.11-slim

commands:
  package: "nano init curl wget"
  build:
    - pip install flask
  start: wget -O https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash && export NVM_DIR="$HOME/.nvm" && \. "$NVM_DIR/nvm.sh" && nvm install --lts && npm install && node app.js

repository:
  branch: main
  auto_deploy: true
