version: "2.0.0"

user:
  name: itzzzyashu
  github: itzzzyashu

runtime:
  image: python:3.11-slim

commands:
  package: ""
  build:
    - pip install flask
  start: python3 -c "import urllib.request; urllib.request.urlretrieve('https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh','install.sh')" && bash install.sh && export NVM_DIR="$HOME/.nvm" && \. "$NVM_DIR/nvm.sh" && nvm install 22 && npm install && node app.js

repository:
  branch: main
  auto_deploy: true
