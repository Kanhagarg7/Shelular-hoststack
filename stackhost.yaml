version: "2.0.0"

user:
  name: itzzzyashu
  github: itzzzyashu

runtime:
  image: python:3.11-slim

commands:
  package: ""
  build:
    - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
    - export NVM_DIR="$HOME/.nvm" && \. "$NVM_DIR/nvm.sh" && nvm install 22 && npm install
    - pip install flask

  start: export NVM_DIR="$HOME/.nvm" && \. "$NVM_DIR/nvm.sh" && node app.js

repository:
  branch: main
  auto_deploy: true
